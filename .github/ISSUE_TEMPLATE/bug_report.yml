name: Bug 报告
description: 报告可以复现的错误
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 说明实际行为和预期行为。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Clipit 版本或提交
      placeholder: 0.1.0 或 Git commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Linux Wayland
        - Linux X11
        - Windows
        - macOS
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: Linux 请提供发行版、桌面环境、portal 后端；其他平台请提供系统版本。请同时提供 Qt 版本。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 粘贴相关终端输出。提交前删除用户名、路径或其他敏感信息。
      render: shell
